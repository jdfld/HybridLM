## Small hybrid model: Gated DeltaNet + Linear Attention, interleaved
##
## Layer pattern (0-indexed):
##   even layers (0, 2, 4, …): GatedDeltaNet  (primary)
##   odd  layers (1, 3, 5, …): LinearAttention (secondary, secondary_every=2)
##
## Model size:  ~95 M non-embedding parameters
## Change paths (trainset_path, out_dir, wandb_dir) before running.

deterministic: False
seed: 100

trainset_path: /fast/jlindqvist/data/lm/fineweb-edu/Llama-2/tokenized_meta-llama_LLama-2-7b-hf/ctx_2048/train/
vocab_size: 32000
seq_len: 2048
sampler: 'stateful_random'
sampler_seed: 42
num_workers: 4

eval: True
validset_path: /fast/jlindqvist/data/lm/fineweb-edu/Llama-2/tokenized_meta-llama_LLama-2-7b-hf/ctx_2048/valid/
eval_every_steps: 2000

tokenizer_path: 'meta-llama/Llama-2-7b-hf'   # set to local path if not cached
text_column: 'text'
add_bos: False
add_eos: False

# --- Model architecture ---
model: 'hybrid_gdn_la_small'
d_model: 512
n_layers: 6
n_heads: 4           # head_dim = 512 / 4 = 128, state_size = 128*128*4*6 = 393216 values
mlp_class: 'swiglu'
expand: '8/3'        # hidden_dim = int(512 * 8/3) = 1365 → rounded to 1536 (multiple_of=256)
tie_embeddings: False
torch_compile: True

# Primary sequence mixer: Gated DeltaNet
# head_dim = d_model / n_heads = 64; value_dim = key_dim * expand_v = 512 * 1.0 = 512
sequence_mixer: 'gdn'
sequence_mixer_config:
  expand_v: 1.0
  use_gate: True    
  use_beta: True     # beta write-gate is the key DeltaNet mechanism
  use_short_conv: True
  allow_neg_eigval: True
  conv_size: 4
  mode: 'chunk'

# Secondary sequence mixer: Linear Attention (placed at every other layer)
secondary_sequence_mixer: 'la'
secondary_every: 2   # odd 0-indexed layers (1, 3, 5, 7, 9, 11) use LA
secondary_sequence_mixer_config:
  expand_k: 1.0
  expand_v: 1.0
  use_short_conv: True
  use_output_gate: True
  use_input_gate: False
  mode: 'chunk'

# --- Training ---
# steps_budget = token_budget / (seq_len * micro_batch_size * grad_accumulation_steps * world_size)
# For ~1.3 B tokens on a single GPU: 1.3e9 / (2048 * 16 * 4 * 1) ≈ 10_000
steps_budget: 10000
micro_batch_size: 16
grad_accumulation_steps: 4
dtype: 'bfloat16'

# --- Optimisation ---
optim: 'adamw'
fused_optim: True
lr: 3.e-3
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0

# --- Scheduler ---
scheduler: 'wsd'
warmup_steps: 0.1
cooldown_steps: 0.1
lr_start: 3.e-4
lr_end: 3.e-4
lr_end_pct: null

# --- Logging ---
log_every_steps: 10
print_progress: True

use_wandb: True
wandb_project: 'llm'
wandb_dir: '/fast/jlindqvist/logs/llm/wandb'
wandb_run_name: 'hybrid_gdn_la_small'
exp_name: 'hybrid_gdn_la_small'
out_dir: '/fast/jlindqvist/exp/llm'
over_write: True

# --- Resuming ---
resume: False
resume_step: null
resume_exp_name: null

# --- Checkpointing ---
save_last_checkpoint: True
save_intermediate_checkpoints: True
save_every_steps: 2000
